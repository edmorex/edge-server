name: Deploy edge-server

# Auto-deploy to the VPS on every push to main.
on:
  push:
    branches: [main]
  workflow_dispatch: {} # allow manual "Run workflow" from the Actions tab

# Never let two deploys run at once; queue them instead.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (for the deploy script)
        uses: actions/checkout@v5

      - name: Deploy over SSH
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # Pipe the version-controlled deploy script to the server and run it,
          # so the script that runs is always the one reviewed in this commit.
          ssh -i "$HOME/.ssh/deploy_key" \
              -o IdentitiesOnly=yes \
              -o UserKnownHostsFile="$HOME/.ssh/known_hosts" \
              -o GlobalKnownHostsFile=/dev/null \
              -o StrictHostKeyChecking=yes \
              "$SSH_USER@$SSH_HOST" 'bash -s' < scripts/deploy.sh
